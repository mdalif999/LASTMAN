name: Build Windows App
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.21.2 reportlab supabase
          # আমরা জোর করে ফ্লেটের একটা স্টেবল নিউয়ার ভার্সন ফিক্সড করে দিচ্ছি যাতে ০.৮৫ এর বাগ না আসে

      - name: Configure Flet CI Mode
        run: |
          mkdir -p $HOME/.config/flet
          echo '{"ci": true, "analytics": false}' > $HOME/.config/flet/config.json
        shell: bash

      - name: Build Windows Executable
        env:
          PYTHONIOENCODING: "utf-8"
          CI: "true"
        run: |
          chcp 65001
          flet build windows --verbose
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cityglass-Windows-App
          path: build/windows