name: Build Windows App
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x' # Flet এর পুরনো/নতুন সব ভার্সনের জন্য এটি সেইফ
          channel: 'stable'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --upgrade flet reportlab supabase

      - name: Build Windows Executable
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          chcp 65001
          echo "y" | flet build windows --verbose
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cityglass-Windows-App
          path: build/windows